  Qwen3-0.6B:
    routing:
      strategy: least_load

    instances:
      - id: "qwen3"
        host: "localhost"
        port: 8002
        cuda_device: 0
      - id: "qwen3-2"
        host: "localhost"
        port: 8004
        cuda_device: 0

    model_config:
      model_tag: "Qwen/Qwen3-0.6B"
      dtype: "float16"
      max_model_len: 1000
      gpu_memory_utilization: 0.35
      tensor_parallel_size: 1
      enable_auto_tool_choice: true
      tool-call-parser: "hermes"

